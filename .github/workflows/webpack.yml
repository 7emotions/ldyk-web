name: Build and Release Vue Site

on:
  push:
    tags:
      - 'v*' # 当推送v开头的标签时触发（如v1.0.0）

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置Node.js环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 使用你项目所需的Node版本
          cache: 'npm'

      # 3. 安装依赖并构建
      - name: Install and Build
        run: |
          npm install
          npm run build # 默认生成dist目录

      # 4. 创建Release并上传构建产物
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/** # 上传整个dist目录
          tag_name: ${{ github.ref_name }} # 使用触发工作流的tag
          name: Release ${{ github.ref_name }}
          body: |
            Vue Site Build - ${{ github.ref_name }}
            Build Date: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 自动使用GitHub token
